<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entretenimiento Digital | Contacto Directo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .contacto-page-section {
            padding-top: 120px;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
        }

        .contacto-page-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.85);
            z-index: 0;
        }

        .contacto-content-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .main-card-setup {
            background: rgba(18, 20, 28, 0.85);
            border: 2px solid #45f3ff;
            box-shadow: 0 0 30px rgba(69, 243, 255, 0.2);
            border-radius: 16px;
            padding: 40px 30px;
            margin-bottom: 40px;
        }

        .whatsapp-direct-section {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .wa-btn-direct {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .wa-btn-direct i {
            font-size: 1.5rem;
        }

        .wa-btn-direct.empresa-btn {
            background: #25d366;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            border: 1px solid #25d366;
        }

        .wa-btn-direct.empresa-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px #25d366;
        }

        .wa-btn-direct.presidencia-btn {
            background: #ff007f;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            border: 1px solid #ff007f;
        }

        .wa-btn-direct.presidencia-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px #ff007f;
        }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <header>
        <div class="logo">Entretenimiento <span>Digital</span></div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="juegos.html">Juegos y Premios</a>
            <a href="menu.html">Menú y Precios</a>
            <a href="ruleta.html">¡Ruleta Digital!</a>
            <a href="contacto.html" class="active">Contacto</a>
        </nav>
    </header>

    <section class="contacto-page-section">
        <div class="contacto-content-container">
            
            <div class="main-card-setup">
                <h2>Líneas Directas de <span>WhatsApp</span></h2>
                <p class="sub" style="color: #ccc;">Selecciona el departamento con el que deseas comunicarte de inmediato.</p>

                <div class="whatsapp-direct-section">
                    <!-- 📱 BOTÓN CON EL NUEVO NÚMERO DE LA EMPRESA REEMPLAZADO -->
                    <a href="https://wa.me/50364537619?text=Hola!%20Acabo%20de%20ver%20la%20página%20web%20y%20quiero%20hacer%20una%20consulta%20sobre%20la%20Zona%20Gamer%20o%20el%20Menú." class="wa-btn-direct empresa-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> 📱 WhatsApp Empresa
                    </a>
                    <a href="https://wa.me/50378856202?text=Hola,%20quiero%20contactarme%20directamente%20con%20la%20administración%20de%20la%20empresa." class="wa-btn-direct presidencia-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> 👑 Contacto Presidencia
                    </a>
                </div>
            </div>

        </div>
    </section>
<!-- MÚSICA EXCLUSIVA PARA LA SECCIÓN DE CONTACTO -->
<script>
  window.addEventListener('DOMContentLoaded', () => {
    localStorage.setItem('bgAudioPlaying', 'false');

    const bgAudio = new Audio('audio/Ocean_of_Light.mp3');
    bgAudio.loop = true;
    bgAudio.volume = 0.15;

    const playAudio = () => {
      bgAudio.play().catch(err => console.log("Esperando clic..."));
    };

    window.addEventListener('click', () => {
      if (bgAudio.paused) playAudio();
    }, { once: true });
  });
</script>
</body>
</html>
